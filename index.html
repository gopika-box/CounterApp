<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <title>Document</title>
</head>
<body class="bg-gray-400 min-h-screen flex flex-col gap-8 justify-center ">
    <h1 class="text-5xl font-bold text-center">Counter App</h1>
    <div class="flex flex-col gap-3">

    <div class="flex gap-3 font-mono justify-center items-center text-2xl">
        <button id="inc" class="border px-2 rounded-sm bg-green-400 hover:bg-green-200">INCREASE</button>
        <h4 id="counter">0</h4>
        <button id="dec" class="border px-2 rounded-sm bg-red-400 hover:bg-red-200">DECREASE</button>
    </div>
    <button id="reset" class="border px-2 rounded-sm mx-auto bg-gray-400 hover:bg-gray-300 text-xl">Reset</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
